name: image
on:
  push:
    tags:
    - '*'
jobs:
  build-image:
    runs-on: ubuntu-latest
    env:
      EXTRA_TAGS: snapshot
    steps:
    - name: Configure envvars
      run: |
        GIT_TAG="${GITHUB_REF#refs/tags/}"
        TAGS=$(
          for repository in quay.io/jcmoraisjr jcmoraisjr; do
            for project in haproxy-ingress; do
              for tag in "$GIT_TAG" ${{ env.EXTRA_TAGS }}; do
                echo -n "${repository}/${project}:${tag},"
              done
            done
          done
        )
        echo "GIT_TAG=$GIT_TAG" >> $GITHUB_ENV
        echo "TAGS=$TAGS" >> $GITHUB_ENV
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
    - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        username: jcmoraisjr
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_TOKEN }}
    - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3
    - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
    - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
      with:
        context: .
        file: builder/Dockerfile
        platforms: linux/amd64,linux/arm64/v8,linux/arm/v7,linux/arm/v6,linux/s390x
        push: true
        build-args: |
          GIT_TAG=${{ env.GIT_TAG }}
        tags: ${{ env.TAGS }}
