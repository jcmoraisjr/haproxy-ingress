name: build
on:
  push:
    branches:
    - master
    - 'release-*'
  pull_request:
    branches:
    - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version: "1.26.3"
    - name: Run build
      run: make build
    - name: golangci-lint
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
      with:
        version: latest
        args: --verbose
    - name: Run unit tests
      run: make test
  integration:
    if: github.ref_name != 'master'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        haproxy-version:
        - "2.6" # minimum supported
        - "3.0" # embedded version
        - "3.3" # latest
        envtest-version:
        - "1.23.5" # oldest supported version
        - "1.35.0" # latest Kubernetes version
      fail-fast: false
    steps:
    - name: Install dependencies
      run: sudo apt-get install -y lua-json
    - name: Install HAProxy ${{ matrix.haproxy-version }}
      uses: timwolla/action-install-haproxy@47ea13d97501d5bb5ed7066e06ffa91eea697816
      id: install-haproxy
      with:
        branch: ${{ matrix.haproxy-version }}
        use_openssl: yes
        use_lua: yes
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version: "1.26.3"
    - name: Run integration tests on Kubernetes ${{ matrix.envtest-version }}
      run: HAPROXY_INGRESS_ENVTEST=${{ matrix.envtest-version }} make test-integration
  image:
    if: github.ref_name == 'master' || startsWith(github.ref_name, 'release-') ## delayed check, PRs do not have access to secrets
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
    - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        username: jcmoraisjr
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3
    - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
    - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
      with:
        context: .
        file: builder/Dockerfile
        platforms: linux/amd64,linux/arm64/v8,linux/arm/v7,linux/arm/v6,linux/s390x
        push: false
        tags: haproxy-ingress.localhost:latest
